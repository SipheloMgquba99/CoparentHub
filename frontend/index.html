<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1b36" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CoparentHub</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0d1b36; }
      #root { min-height: 100vh; }
      .boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        background: #0d1b36; color: #f4c95d;
        font-family: Georgia, 'Times New Roman', serif;
      }
      .boot-logo { font-size: 24px; font-weight: bold; letter-spacing: .5px; }
      .boot-ring {
        width: 26px; height: 26px; border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 0%, transparent 65%, #f4c95d 100%);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
                mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
        animation: boot-rot .75s cubic-bezier(.5,0,.5,1) infinite;
      }
      @keyframes boot-rot { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div class="boot-splash"><div class="boot-logo">coparenthub</div><div class="boot-ring"></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
